<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-192.png" />
    <link rel="icon" type="image/svg+xml" href="/gws-connect-favicon.svg" />
    
    <!-- Modern Viewport Configuration -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes" />
    
    <!-- iOS App Configuration -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GWS Connect" />
    
    <!-- Android Configuration -->
    <meta name="theme-color" content="#DC2626" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- PWA Configuration (manifest is auto-injected by vite-plugin-pwa) -->
    <link rel="apple-touch-icon" href="/favicon-180.png" />
    
    <!-- Color Scheme -->
    <meta name="color-scheme" content="light dark" />
    <meta name="supported-color-schemes" content="light dark" />
    
    <!-- SEO and Accessibility -->
    <meta name="description" content="GWS Connect - Real-time messaging and video calls" />
    <meta name="keywords" content="chat, messaging, video call, communication" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="x-ua-compatible" content="IE=edge" />
    
    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    
    <title>GWS Connect</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
