name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate deployment scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check shell syntax for deploy helpers
        run: bash -n scripts/db/backup-local.sh scripts/db/deploy.sh scripts/db/promote-to-production.sh scripts/db/remote-full-sync-deploy.sh scripts/db/remote-only-deploy.sh scripts/db/sync-dev-to-prod.sh scripts/db/upload-and-remote-deploy.sh scripts/db/upload-and-remote-full-sync.sh

      - name: Show dispatcher help
        run: bash scripts/db/deploy.sh --help

  deploy:
    needs: validate
    name: SSH deploy to DigitalOcean
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 137.184.158.247
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/apps/GWS-Connect/repo
            git pull origin main
            docker compose up -d --build
            echo "Deploy complete"
